name: Weekly Industry Report

on:
  schedule:
    - cron: '30 18 * * 1'
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

permissions:
  contents: write

jobs:
  weekly-report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pyyaml lxml pillow playwright openai pandas

      - name: Install browser and fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-wqy-zenhei fontconfig
          sudo fc-cache -fv
          playwright install --with-deps chromium

      - name: Generate Weekly Data
        run: |
          python scripts/generate_weekly.py

      - name: Generate Products
        run: |
          python scripts/get_products.py

      - name: Generate Product Signals
        run: |
          python scripts/get_product_signals.py

      - name: Analyze Weekly
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python scripts/analyze_weekly.py

      - name: Fetch News Images
        run: python scripts/fetch_news_images.py

      - name: Generate Weekly HTML
        run: |
          python scripts/generate_weekly_html.py

      - name: Render Weekly Image
        run: |
          python scripts/render_weekly_report.py

      - name: Upload Weekly HTML
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report-html
          path: output/weekly/weekly_report.html

      - name: Upload Weekly Image
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report-image
          path: weekly-report.png

      - name: Commit Weekly Report
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git commit -m "weekly report" || echo "nothing to commit"
          git push
   

      - name: Send Weekly WeCom
        continue-on-error: true
        env:
          REPORT_WEBHOOK: ${{ secrets.REPORT_WEBHOOK }}
          WEEKLY_URL: https://yangyituo1231.github.io/Trendradar-sports-news/output/weekly/weekly_report.html
          SOURCE_FILE: weekly-report.png
          SEND_FILE: weekly-report-send.jpg
        run: |
          python scripts/send_weekly_wecom.py
