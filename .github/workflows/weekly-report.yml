name: Weekly Industry Report

on:
  schedule:
    - cron: '30 0 * * 1'
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

permissions:
  contents: write

jobs:
  weekly-report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install \
            requests \
            beautifulsoup4 \
            pyyaml \
            lxml \
            pillow \
            playwright \
            openai \
            pandas

      - name: Install browser
        run: |
          playwright install --with-deps chromium

      - name: Generate Weekly Data
        run: |
          python scripts/generate_weekly.py

      - name: Generate Products
        run: |
          python scripts/get_products.py

      - name: Generate Product Signals
        run: |
          python scripts/get_product_signals.py

      - name: Analyze Weekly
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python scripts/analyze_weekly.py

      - name: Generate Weekly HTML
        run: |
          python scripts/generate_weekly_html.py

      - name: Commit Weekly Report
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .
          git commit -m "weekly report" || echo "nothing to commit"
          git push
