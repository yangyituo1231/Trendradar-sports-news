name: Render Daily Report Image

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chinese fonts and Playwright
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-wqy-zenhei fontconfig
          sudo fc-cache -fv
          fc-list :lang=zh
          pip install playwright requests beautifulsoup4 pyyaml lxml
          playwright install --with-deps chromium

      - name: Refresh Weather Data
        run: |
          python scripts/get_weather.py

      - name: Fill HTML template
        run: |
          python scripts/fill_report.py

      - name: Render HTML to PNG
        run: |
          python scripts/render_report.py

      - name: Upload PNG
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-image
          path: daily-report.png
