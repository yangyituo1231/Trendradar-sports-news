name: Daily Auto Report

on:
  schedule:
    - cron: '27 18 * * *'
    - cron: '47 18 * * *'
  workflow_dispatch:
  
env:
  TZ: Asia/Shanghai

permissions:
  contents: write

jobs:
  auto-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install \
            requests \
            beautifulsoup4 \
            pyyaml \
            lxml \
            pillow \
            playwright \
            openai \
            python-pptx \
            pandas

      - name: Install browser and fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fonts-noto-cjk \
            fonts-wqy-zenhei \
            fontconfig

          sudo fc-cache -fv

          playwright install --with-deps chromium

      - name: Fetch News
        run: |
          python scripts/get_hot_news.py

      - name: Fetch Weather
        run: |
          python scripts/get_weather.py

      - name: Fill Report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python scripts/fill_report.py

      - name: Render Report
        run: |
          python scripts/render_report.py
          
      - name: Generate Weekly Data
        run: |
          python scripts/generate_weekly.py
          
      - name: Generate Products Data
        run: |
          python scripts/get_products.py
          
      - name: Generate Product Signals
        run: |
          python scripts/get_product_signals.py
          
      - name: Analyze Weekly Data
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          echo "DEEPSEEK key exists? ${{ secrets.DEEPSEEK_API_KEY != '' }}"
          python -c "import os; print('python env exists?', bool(os.getenv('DEEPSEEK_API_KEY')))"
          python scripts/analyze_weekly.py
    
      - name: Generate Weekly HTML
        run: |
          python scripts/generate_weekly_html.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-image
          path: daily-report.png
      - name: Upload Weekly HTML
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report-html
          path: output/weekly/weekly_report.html

      - name: Commit files
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .

          git commit -m "auto update report" || echo "nothing to commit"

          git push

      - name: Send WeCom Text
        continue-on-error: true
        run: |
          curl --max-time 20 --connect-timeout 10 "${{ secrets.REPORT_WEBHOOK }}" \
            -H 'Content-Type: application/json' \
            -d '{
              "msgtype": "markdown",
              "markdown": {
                "content": "# 运动品牌行业资讯日报如下"
              }
            }' || echo "WeCom text send failed, skip."

      - name: Send WeCom Image
        continue-on-error: true
        env:
          REPORT_WEBHOOK: ${{ secrets.REPORT_WEBHOOK }}
        run: |
          python scripts/send_wecom_image.py || echo "WeCom image send failed, skip."
