name: Daily Auto Report

on:
  workflow_dispatch:

  schedule:
    # 北京时间早上8:00 = UTC 00:00
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  auto-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pyyaml lxml pillow playwright

      - name: Install browser and fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-wqy-zenhei fontconfig
          sudo fc-cache -fv
          playwright install --with-deps chromium

      - name: Fetch News
        run: |
          python scripts/get_hot_news.py

      - name: Fetch Weather
        run: |
          python scripts/get_weather.py

      - name: Fill Report
        run: |
          python scripts/fill_report.py

      - name: Render Report
        run: |
          python scripts/render_report.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-image
          path: daily-report.png

      - name: Commit files
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git commit -m "auto update report" || echo "nothing to commit"
          git push

      - name: Send WeCom Message
        run: |
          curl '${{ secrets.REPORT_WEBHOOK }}' \
            -H 'Content-Type: application/json' \
            -d '{
              "msgtype": "markdown",
              "markdown": {
                "content": "# 运动品牌行业资讯日报\n\n今日日报已自动生成。\n\n请在 GitHub Actions 的 daily-report-image 产物中查看图片。"
              }
            }'
