name: Generate Sports News Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4 pyyaml lxml openai

      # 1. 抓新闻
      - name: Run News Fetcher
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python scripts/get_hot_news.py

      # 2. 抓实时天气
      - name: Run Weather Fetcher
        run: |
          python scripts/get_weather.py

      # 3. 生成日报
      - name: Run Fill Report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python scripts/fill_report.py

      # 4. 生成周报分析
      - name: Run Weekly Analysis
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python scripts/analyze_weekly.py

      # 5. 生成周报 HTML
      - name: Run Weekly Report
        run: |
          python scripts/generate_weekly_html.py

      # 6. 自动提交
      - name: Commit Generated Files
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .

          git commit -m "auto update report" || echo "nothing to commit"

          git push
