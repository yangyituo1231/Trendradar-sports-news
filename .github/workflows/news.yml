name: Generate Sports News Report

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4 jinja2 pyyaml pillow wordcloud matplotlib selenium webdriver-manager

      - name: Run News Fetcher
        run: |
          python scripts/get_hot_news.py

      - name: Run Fill Report
        run: |
          python scripts/fill_report.py

      - name: Commit Generated Files
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .

          git commit -m "auto update report" || echo "no changes"

          git push
