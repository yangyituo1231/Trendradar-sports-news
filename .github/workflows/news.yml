name: Generate Sports News Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4 pyyaml lxml openai

      - name: Fetch News
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python scripts/get_hot_news.py

      - name: Fetch Weather
        run: |
          python scripts/get_weather.py

      - name: Fill Daily Report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python scripts/fill_report.py

      - name: Analyze Weekly Data
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python scripts/analyze_weekly.py

      - name: Generate Weekly HTML
        run: |
          python scripts/generate_weekly_html.py

      - name: Generate Weekly PPT
        run: |
          python scripts/generate_weekly_ppt.py

      - name: Commit Generated Files
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .

          git commit -m "auto update report" || echo "nothing to commit"

          git pull --rebase origin master

          git push origin master
