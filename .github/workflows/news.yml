name: Generate Sports News Report

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  build-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install pillow wordcloud

      - name: Run News Fetcher
        run: |
          python scripts/get_hot_news.py

      - name: Run Fill Report
        run: |
          python scripts/fill_report.py

      - name: Commit Generated Files
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .

          git diff --cached --quiet || git commit -m "auto update report"

          git push
