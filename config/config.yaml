      name: "今日头条"
    - id: "baidu"
      name: "百度热搜"
    - id: "weibo"
      name: "微博"
    - id: "douyin"
      name: "抖音"
    - id: "thepaper"
      name: "澎湃新闻"
    - id: "cls-hot"
      name: "财联社热门"
    - id: "zhihu"
      name: "知乎"

