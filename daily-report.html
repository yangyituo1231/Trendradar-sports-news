<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>运动品牌行业资讯日报</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f3f6fb;
    padding:20px;
}

.container{
    width:1200px;
    margin:auto;
}

.header{
    background:#0d2c6c;
    color:white;
    padding:25px;
    border-radius:16px;
}

.title{
    font-size:42px;
    font-weight:bold;
}

.subtitle{
    margin-top:10px;
    font-size:18px;
    opacity:0.9;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-top:20px;
}

.card{
    background:white;
    border-radius:16px;
    padding:20px;
}

.card-title{
    font-size:24px;
    font-weight:bold;
    color:#0d2c6c;
    margin-bottom:15px;
}

.news-item{
    margin-bottom:15px;
    padding-bottom:15px;
    border-bottom:1px solid #eee;
}

.tag{
    display:inline-block;
    background:#e8f0ff;
    color:#0d2c6c;
    padding:4px 10px;
    border-radius:20px;
    font-size:12px;
    margin-bottom:8px;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#888;
}
</style>
</head>

<body>

<div class="container">

<div class="header">

<div class="subtitle">
每日精选｜洞察趋势｜辅助决策
</div>
</div>

<div class="grid">

<div class="card">
<div class="card-title">重点资讯 TOP5</div>

<div class="news-item">
<div class="tag">运动品牌</div>
<div><b>{{top1_title}}</b></div>
<div>{{top1_desc}}</div>
</div>

<div class="news-item">
<div class="tag">儿童消费</div>
<div><b>{{top2_title}}</b></div>
<div>{{top2_desc}}</div></div>

</div>

<div class="card">
<div class="card-title">经营趋势观察</div>

<div class="news-item">
<div class="tag">平台趋势</div>
<div><b>{{trend1_title}}</b></div>
<div>{{trend1_desc}}</div>
</div>

<div class="news-item">

<div><b>{{trend2_title}}</b></div>
<div>{{trend2_desc}}</div>

</div>

<div class="footer">

</html>
